version: '3.7'

services:
  mysql:
    image: mysql:8.0
    container_name: rizky_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "34905:3306"
    volumes:
      - rizky_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rizky_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "34906:5672"
      - "34907:15672"
    volumes:
      - rizky_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: rizky_auth
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: marketplace_auth
      JWT_SECRET: supersecretjwtkey123456789
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: supersecretrefreshkey123456789
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "34901:3001"
    depends_on:
      - mysql
    links:
      - mysql

  product-service:
    build: ./product-service
    container_name: rizky_product
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: marketplace_products
      JWT_SECRET: supersecretjwtkey123456789
    ports:
      - "34902:3002"
    depends_on:
      - mysql
    links:
      - mysql

  order-service:
    build: ./order-service
    container_name: rizky_order
    restart: unless-stopped
    environment:
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: marketplace_orders
      JWT_SECRET: supersecretjwtkey123456789
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PRODUCT_SERVICE_URL: http://product-service:3002
    ports:
      - "34903:3003"
    depends_on:
      - mysql
      - rabbitmq
    links:
      - mysql
      - rabbitmq
      - product-service

  notification-service:
    build: ./notification-service
    container_name: rizky_notification
    restart: unless-stopped
    environment:
      PORT: 3004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: marketplace_notifications
      JWT_SECRET: supersecretjwtkey123456789
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "34904:3004"
    depends_on:
      - mysql
      - rabbitmq
    links:
      - mysql
      - rabbitmq

  api-gateway:
    build: ./api-gateway
    container_name: rizky_gateway
    restart: unless-stopped
    environment:
      PORT: 3000
      JWT_SECRET: supersecretjwtkey123456789
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "34900:3000"
    depends_on:
      - auth-service
      - product-service
      - order-service
      - notification-service
    links:
      - auth-service
      - product-service
      - order-service
      - notification-service

volumes:
  rizky_mysql_data:
  rizky_rabbitmq_data:
